<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - My Storage</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      background:
      linear-gradient(
        135deg,
        #0f172a,
        #111827,
        #1e293b
      );

      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      color:white;
    }

    /* BACKGROUND GLOW */

    .glow{
      position:absolute;
      width:300px;
      height:300px;
      border-radius:50%;
      background:#2563eb;
      filter:blur(120px);
      opacity:0.4;
      z-index:0;
    }

    .glow.one{
      top:-100px;
      left:-100px;
    }

    .glow.two{
      bottom:-120px;
      right:-120px;
      background:#7c3aed;
    }

    /* LOGIN CARD */

    .login-box{
      position:relative;
      z-index:2;

      width:400px;
      padding:40px;

      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);

      backdrop-filter:blur(18px);

      border-radius:28px;

      box-shadow:
      0 10px 40px rgba(0,0,0,0.4);
    }

    .logo{
      text-align:center;
      font-size:42px;
      margin-bottom:10px;
    }

    .title{
      text-align:center;
      font-size:28px;
      font-weight:bold;
      margin-bottom:10px;
    }

    .subtitle{
      text-align:center;
      color:#94a3b8;
      margin-bottom:35px;
      font-size:14px;
    }

    .input-group{
      margin-bottom:20px;
    }

    .input-group label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      color:#cbd5e1;
    }

    .input-group input{
      width:100%;
      padding:15px;
      border:none;
      border-radius:14px;

      background:#0f172a;
      color:white;

      outline:none;
      font-size:15px;

      border:1px solid transparent;
      transition:0.2s;
    }

    .input-group input:focus{
      border-color:#3b82f6;
    }

    .login-btn{
      width:100%;
      padding:15px;

      border:none;
      border-radius:14px;

      background:linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
      );

      color:white;
      font-size:16px;
      font-weight:bold;

      cursor:pointer;
      transition:0.25s;
    }

    .login-btn:hover{
      transform:translateY(-2px);
      opacity:0.95;
    }

    .bottom{
      text-align:center;
      margin-top:25px;
      font-size:14px;
      color:#94a3b8;
    }

    .bottom a{
      color:#60a5fa;
      text-decoration:none;
    }

    .bottom a:hover{
      text-decoration:underline;
    }

    /* MOBILE */

    @media(max-width:480px){

      .login-box{
        width:92%;
        padding:30px;
      }

    }

  </style>
</head>

<body>

  <!-- GLOW -->

  <div class="glow one"></div>
  <div class="glow two"></div>

  <!-- LOGIN BOX -->

  <div class="login-box">

    <div class="logo">
      🗄️
    </div>

    <div class="title">
      My Storage
    </div>

    <div class="subtitle">
      Tempat penyimpanan digital pribadi
    </div>

    <form id="loginForm">

      <div class="input-group">
        <label>Email</label>
        <input
          type="email"
          id="email"
          placeholder="Masukkan email"
          required
        >
      </div>

      <div class="input-group">
        <label>Password</label>
        <input
          type="password"
          id="password"
          placeholder="Masukkan password"
          required
        >
      </div>

      <button type="submit" class="login-btn">
        Masuk
      </button>

    </form>

    <div class="bottom">
      Sistem penyimpanan pribadi berbasis cloud
    </div>

  </div>

  <script>

    // CONTOH LOGIN

    document
      .getElementById("loginForm")
      .addEventListener("submit", function(e){

      e.preventDefault();

      const email =
        document.getElementById("email").value;

      const password =
        document.getElementById("password").value;

      console.log({
        email,
        password
      });

      // NANTI KIRIM KE GAS API
      // fetch("URL_GAS", { ... })

      alert("Login request dikirim");

    });

  </script>

</body>
</html>

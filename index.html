<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - My Storage</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      color:white;
    }

    .glow{
      position:absolute;
      width:300px;
      height:300px;
      border-radius:50%;
      filter:blur(120px);
      opacity:0.4;
      z-index:0;
    }

    .glow.one{
      top:-100px;
      left:-100px;
      background:#2563eb;
    }

    .glow.two{
      bottom:-120px;
      right:-120px;
      background:#7c3aed;
    }

    .login-box{
      position:relative;
      z-index:2;
      width:400px;
      padding:40px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      backdrop-filter:blur(18px);
      border-radius:28px;
      box-shadow:0 10px 40px rgba(0,0,0,0.4);
    }

    .logo{
      text-align:center;
      font-size:42px;
      margin-bottom:10px;
    }

    .title{
      text-align:center;
      font-size:28px;
      font-weight:bold;
      margin-bottom:10px;
    }

    .subtitle{
      text-align:center;
      color:#94a3b8;
      margin-bottom:35px;
      font-size:14px;
    }

    .input-group{
      margin-bottom:20px;
    }

    .input-group label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      color:#cbd5e1;
    }

    .input-group input{
      width:100%;
      padding:15px;
      border:none;
      border-radius:14px;
      background:#0f172a;
      color:white;
      outline:none;
      font-size:15px;
      border:1px solid transparent;
      transition:0.2s;
    }

    .input-group input:focus{
      border-color:#3b82f6;
    }

    .login-btn{
      width:100%;
      padding:15px;
      border:none;
      border-radius:14px;
      background:linear-gradient(135deg,#2563eb,#7c3aed);
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.25s;
    }

    .login-btn:hover{
      transform:translateY(-2px);
      opacity:0.95;
    }

    .login-btn:disabled{
      opacity:0.6;
      cursor:not-allowed;
    }

    .bottom{
      text-align:center;
      margin-top:25px;
      font-size:14px;
      color:#94a3b8;
    }

    @media(max-width:480px){
      .login-box{
        width:92%;
        padding:30px;
      }
    }
  </style>
</head>

<body>

  <div class="glow one"></div>
  <div class="glow two"></div>

  <div class="login-box">

    <div class="logo">🗄️</div>

    <div class="title">My Storage</div>

    <div class="subtitle">Tempat penyimpanan digital pribadi</div>

    <form id="loginForm">

      <div class="input-group">
        <label>Email</label>
        <input type="text" id="email" placeholder="Masukkan ID" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Masukkan password" required>
      </div>

      <button type="submit" class="login-btn" id="loginBtn">
        Masuk
      </button>

    </form>

    <div class="bottom">
      Sistem penyimpanan pribadi berbasis cloud
    </div>

  </div>

  <script>

    const GAS_URL =
      "https://script.google.com/macros/s/AKfycbxnxUQMxYJ7s5im4TZV1wFH0BEMTxJ53iwX4idEkPzKlCaJmYzjxXUj63O5zA02y7Q/exec";

    const form = document.getElementById("loginForm");
    const btn = document.getElementById("loginBtn");

    form.addEventListener("submit", async function(e){

      e.preventDefault();

      const id = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      btn.disabled = true;
      btn.innerText = "Memproses...";

      try {

        const res = await fetch(GAS_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            id,
            password
          })
        });

        const result = await res.json();

        if(result.success){

          // simpan session sederhana
          localStorage.setItem("user", JSON.stringify(result.user));

          alert("Login berhasil, selamat datang " + result.user.name);

          // redirect ke dashboard
          window.location.href = "home.html";

        } else {
          alert(result.message || "Login gagal");
        }

      } catch (err) {
        alert("Gagal konek ke server");
        console.error(err);
      }

      btn.disabled = false;
      btn.innerText = "Masuk";

    });

  </script>

</body>
</html>

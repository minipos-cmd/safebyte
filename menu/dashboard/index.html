<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lemari Digital</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      display:flex;
      height:100vh;
      overflow:hidden;
    }

    /* SIDEBAR */
    .sidebar{
      width:260px;
      background:#111827;
      padding:20px;
      border-right:1px solid rgba(255,255,255,0.08);
    }

    .logo{
      font-size:24px;
      font-weight:bold;
      margin-bottom:30px;
      color:#60a5fa;
    }

    .menu{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .menu button{
      background:#1e293b;
      border:none;
      color:white;
      padding:14px;
      border-radius:12px;
      text-align:left;
      cursor:pointer;
      transition:0.2s;
      font-size:15px;
    }

    .menu button:hover{
      background:#2563eb;
      transform:translateX(4px);
    }

    /* MAIN */
    .main{
      flex:1;
      display:flex;
      flex-direction:column;
    }

    /* TOPBAR */
    .topbar{
      height:70px;
      border-bottom:1px solid rgba(255,255,255,0.08);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 25px;
      background:#111827;
    }

    .search{
      width:300px;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#1e293b;
      color:white;
      outline:none;
    }

    .user{
      background:#2563eb;
      width:42px;
      height:42px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:bold;
    }

    /* CONTENT */
    .content{
      padding:25px;
      overflow-y:auto;
    }

    .title{
      font-size:28px;
      margin-bottom:20px;
    }

    /* GRID */
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(220px,1fr));
      gap:20px;
    }

    .card{
      background:#1e293b;
      border-radius:18px;
      padding:20px;
      cursor:pointer;
      transition:0.25s;
      border:1px solid transparent;
    }

    .card:hover{
      transform:translateY(-5px);
      border-color:#3b82f6;
    }

    .icon{
      font-size:42px;
      margin-bottom:15px;
    }

    .card p{
      color:#94a3b8;
      font-size:14px;
    }

    /* NOTES */
    .notes{
      margin-top:35px;
    }

    .notes textarea{
      width:100%;
      height:140px;
      margin-top:15px;
      background:#1e293b;
      border:none;
      border-radius:15px;
      padding:15px;
      color:white;
      resize:none;
      outline:none;
      font-size:14px;
    }

    @media(max-width:768px){
      .sidebar{display:none;}
      .search{width:180px;}
      .title{font-size:22px;}
    }

  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">🗄️ My Storage</div>

    <div class="menu">
      <button onclick="go('all')">📁 Semua File</button>
      <button onclick="go('password')">🔐 Password</button>
      <button onclick="go('coding')">💻 Coding</button>
      <button onclick="go('jadwal')">📅 Jadwal</button>
      <button onclick="go('website')">🌐 Link Penting</button>
      <button onclick="go('note')">📝 Catatan</button>
      <button onclick="go('favorit')">⭐ Favorit</button>
      <button onclick="go('sampah')">🗑️ Sampah</button>
      <button onclick="go('file')">📁 Dokumen</button>
      <button onclick="go('fastfile')">⚡ Quick Note</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <input type="text" class="search" placeholder="Cari file, catatan, password...">
      <div class="user">A</div>
    </div>

    <div class="content">

      <div class="title">Dashboard Penyimpanan</div>

      <div class="grid">

        <div class="card" onclick="go('password')">
          <div class="icon">🔐</div>
          <h3>Password</h3>
          <p>Simpan akun & password penting</p>
        </div>

        <div class="card" onclick="go('coding')">
          <div class="icon">💻</div>
          <h3>Code Snippet</h3>
          <p>Simpan script dan coding</p>
        </div>

        <div class="card" onclick="go('jadwal')">
          <div class="icon">📅</div>
          <h3>Jadwal</h3>
          <p>Catatan agenda & reminder</p>
        </div>

        <div class="card" onclick="go('website')">
          <div class="icon">🌐</div>
          <h3>Link Penting</h3>
          <p>Kumpulan website favorit</p>
        </div>

        <div class="card" onclick="go('file')">
          <div class="icon">📁</div>
          <h3>Dokumen</h3>
          <p>PDF, ZIP, gambar dan file</p>
        </div>

        <div class="card" onclick="go('fastfile')">
          <div class="icon">⚡</div>
          <h3>Quick Notes</h3>
          <p>Catatan cepat harian</p>
        </div>

      </div>

      <div class="notes">
        <h2>📝 Catatan Cepat</h2>
        <textarea placeholder="Tulis sesuatu di sini..."></textarea>
      </div>

    </div>
  </div>

<script>

function go(page){

  const routes = {
    all: "https://minipos-cmd.github.io/safebyte/menu/allfile/index.html",
    password: "https://minipos-cmd.github.io/safebyte/menu/password/index.html",
    coding: "https://minipos-cmd.github.io/safebyte/menu/coding/index.html",
    jadwal: "https://minipos-cmd.github.io/safebyte/menu/jadwal/index.html",
    website: "https://minipos-cmd.github.io/safebyte/menu/website/index.html",
    note: "https://minipos-cmd.github.io/safebyte/menu/note/index.html",
    favorit: "https://minipos-cmd.github.io/safebyte/menu/favorit/index.html",
    sampah: "https://minipos-cmd.github.io/safebyte/menu/note/index.html",
    file: "https://minipos-cmd.github.io/safebyte/menu/file/index.html",
    fastfile: "https://minipos-cmd.github.io/safebyte/menu/fastfile/index.html"
  };

  window.location.href = routes[page];
}

</script>

</body>
</html>

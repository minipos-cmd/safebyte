<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Password Manager</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#071327;
color:white;
padding:20px;
}

/* BACK */
.back{
display:inline-block;
margin-bottom:10px;
color:#93c5fd;
text-decoration:none;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.add-btn{
background:#2563eb;
border:none;
color:white;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
}

/* STATS */
.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-bottom:15px;
}

.stat{
background:#16233f;
padding:12px;
border-radius:12px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:15px;
}

/* CARD FIXED HEIGHT STRUCTURE */
.card{
background:#16233f;
padding:15px;
border-radius:15px;

display:flex;
flex-direction:column;
justify-content:space-between;

min-height:160px;
}

.name{
font-weight:bold;
}

.email{
color:#9ca3af;
font-size:13px;
}

/* FIX AREA PASSWORD */
.pass{
margin:10px 0;
color:#9ca3af;
}

/* ACTION FIX ALWAYS BOTTOM */
.actions{
display:flex;
gap:8px;
margin-top:auto;
}

.actions button{
flex:1;
background:#223353;
border:none;
padding:8px;
border-radius:8px;
color:white;
cursor:pointer;
}

/* TOAST */
.toast{
position:fixed;
bottom:20px;
right:20px;
background:#1f2937;
padding:10px 15px;
border-radius:10px;
opacity:0;
transform:translateY(20px);
transition:.25s ease;
font-size:13px;
pointer-events:none;
}

.toast.show{
opacity:1;
transform:translateY(0);
}

/* LOADING */
.loading{
text-align:center;
color:#9ca3af;
margin:20px 0;
}

/* OVERLAY */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
opacity:0;
visibility:hidden;
transition:.25s ease;
}

.overlay.show{
opacity:1;
visibility:visible;
}

/* SLIDER */
.slider{
position:fixed;
top:0;
right:-400px;
width:360px;
height:100%;
background:#16233f;
padding:20px;
transition:.35s cubic-bezier(.22,1,.36,1);
}

.slider.show{
right:0;
}

.eye{
background:#223353;
color:white;
padding:10px;
border:none;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

/* COPY INLINE BUTTON */
.copy-inline{
background:#2563eb;
border:none;
color:white;
padding:5px 8px;
border-radius:6px;
font-size:12px;
cursor:pointer;
margin-left:8px;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.6);
opacity:0;
visibility:hidden;
transition:.25s ease;
}

.modal.show{
opacity:1;
visibility:visible;
}

.box{
background:#16233f;
padding:20px;
border-radius:12px;
width:300px;
transform:translateY(15px) scale(.95);
transition:.25s ease;
}

.modal.show .box{
transform:translateY(0) scale(1);
}

input,textarea{
width:100%;
margin-bottom:10px;
padding:10px;
border:none;
border-radius:8px;
background:#223353;
color:white;
}

.save{
background:#2563eb;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<a class="back" href="https://minipos-cmd.github.io/safebyte/menu/dashboard/index.html">
← Dashboard
</a>

<div class="header">
<h1>🔐 Password Manager</h1>
<button class="add-btn" onclick="openAdd()">+ Tambah Password</button>
</div>

<div class="stats">
<div class="stat">Total Password: <b id="totalPw">0</b></div>
<div class="stat">Kategori: <b id="totalCat">0</b></div>
<div class="stat">Terakhir: <b id="lastAdd">-</b></div>
</div>

<!-- LOADING STATE -->
<div id="loading" class="loading">⏳ Mengambil data dari server...</div>

<div class="grid" id="grid"></div>

<div id="toast" class="toast"></div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeSlider()"></div>

<!-- SLIDER -->
<div class="slider" id="slider">

<h2 id="sTitle"></h2>
<p id="sUser"></p>

<!-- PASSWORD + COPY INLINE -->
<div style="display:flex;align-items:center;">
<p id="sPass">******</p>
<button class="copy-inline" onclick="copySliderPass()">copy</button>
</div>

<button class="eye" onclick="togglePass()">👁 Show / Hide</button>

<p id="sNotes"></p>

<button class="edit" onclick="openEdit()">✏ Edit</button>
<button class="delete" onclick="openDelete()">🗑 Hapus</button>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="box">

<h3>Data Password</h3>

<input id="fWebsite" placeholder="Website">
<input id="fUsername" placeholder="Username">
<input id="fPassword" placeholder="Password">
<textarea id="fNotes" placeholder="Notes"></textarea>

<button class="save" onclick="saveData()">Simpan</button>

</div>
</div>

<script>

const GAS = "https://script.google.com/macros/s/AKfycbzHcqSyk0jwF6WbxKVXKlwBGnyayfRFrZjNT040hNNYRuR9bSbQP1424ze-Ozsj0NiA/exec";

let DATA = [];
let SELECTED = null;
let showPass = false;

/* LOAD */
document.addEventListener("DOMContentLoaded", load);

async function load(){

document.getElementById("loading").style.display="block";

const res = await fetch(GAS+"?action=getPasswords");
const json = await res.json();

DATA = json.data;

document.getElementById("loading").style.display="none";

render();
updateStats();

}

/* RENDER */
function render(){

const g = document.getElementById("grid");
g.innerHTML="";

DATA.forEach(d=>{

g.innerHTML += `
<div class="card">
<div>
<div class="name">${d.website}</div>
<div class="email">${d.username}</div>
<div class="pass">******</div>
</div>

<div class="actions">
<button onclick='copyPass("${d.password}")'>📋</button>
<button onclick='openSlider(${JSON.stringify(d)})'>👁</button>
</div>
</div>
`;

});

}

/* STATS */
function updateStats(){

document.getElementById("totalPw").innerText = DATA.length;

document.getElementById("totalCat").innerText =
new Set(DATA.map(x=>x.category_id)).size;

const last = [...DATA].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0];

document.getElementById("lastAdd").innerText = last?.website || "-";

}

/* COPY CARD */
function copyPass(t){
navigator.clipboard.writeText(t);
toast("Copied ✔");
}

/* COPY SLIDER PASSWORD */
function copySliderPass(){
navigator.clipboard.writeText(SELECTED.password);
toast("Password copied ✔");
}

/* TOAST */
function toast(t){
const el=document.getElementById("toast");
el.innerText=t;
el.classList.add("show");

setTimeout(()=>el.classList.remove("show"),2000);
}

/* SLIDER */
function openSlider(d){

SELECTED=d;

document.getElementById("sTitle").innerText=d.website;
document.getElementById("sUser").innerText=d.username;
document.getElementById("sPass").innerText="******";
document.getElementById("sNotes").innerText=d.notes||"-";

document.getElementById("slider").classList.add("show");
document.getElementById("overlay").classList.add("show");

showPass=false;

}

function closeSlider(){
document.getElementById("slider").classList.remove("show");
document.getElementById("overlay").classList.remove("show");
}

/* TOGGLE PASS */
function togglePass(){
showPass=!showPass;
document.getElementById("sPass").innerText =
showPass ? SELECTED.password : "******";
}

/* ADD */
function openAdd(){
document.getElementById("modal").classList.add("show");
}

/* EDIT */
function openEdit(){
document.getElementById("modal").classList.add("show");

document.getElementById("fWebsite").value=SELECTED.website;
document.getElementById("fUsername").value=SELECTED.username;
document.getElementById("fPassword").value=SELECTED.password;
document.getElementById("fNotes").value=SELECTED.notes||"";
}

/* SAVE */
async function saveData(){

await fetch(GAS,{
method:"POST",
body:JSON.stringify({
action:"updatePassword",
id:SELECTED?.id,
website:fWebsite.value,
username:fUsername.value,
password:fPassword.value,
notes:fNotes.value
})
});

document.getElementById("modal").classList.remove("show");
load();

}

/* DELETE (placeholder) */
function openDelete(){
toast("Delete siap di GAS next step");
}

</script>

</body>
</html>
